name: Sync from Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/nimraweb3/nim-trade-journal.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream
        run: |
          git merge upstream/main --no-edit

      - name: Push changes
        run: |
          git push origin main

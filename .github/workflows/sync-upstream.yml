name: Sync from Upstream
on:
  workflow_dispatch: # Allow manual trigger only (disable scheduled runs for now)

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if UPSTREAM_REPO is set
        id: check-secret
        run: |
          if [ -z "${{ secrets.UPSTREAM_REPO }}" ]; then
            echo "UPSTREAM_REPO secret is not set, skipping sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync with upstream
        if: steps.check-secret.outputs.skip == 'false'
        run: |
          # Remove upstream if it already exists
          git remote remove upstream 2>/dev/null || true
          
          # Add upstream
          git remote add upstream ${{ secrets.UPSTREAM_REPO }}
          
          # Fetch upstream
          git fetch upstream
          
          # Merge upstream changes
          git merge upstream/main --allow-unrelated-histories -m "Merge upstream changes" || {
            echo "Merge failed, please resolve conflicts manually"
            exit 1
          }
          
          # Push changes
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
